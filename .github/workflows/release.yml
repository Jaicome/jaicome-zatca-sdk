name: Release

# Triggers on every push to main
# - If changesets exist: Creates/updates Release PR
# - If Release PR merged: Publishes to npm with OIDC provenance
on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for changesets to read git history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run --cwd packages/zatca-core build && bun run --cwd packages/zatca-server build

      - name: Run tests
        run: bun run --cwd packages/zatca-server test

      # Changesets action handles two scenarios:
      # 1. Changesets present → Create/update Release PR with version bumps
      # 2. No changesets (Release PR was merged) → Runs 'pnpm release' to build and publish
      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm changeset version
          publish: pnpm release
          title: "release: version packages"
          commit: "release: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
